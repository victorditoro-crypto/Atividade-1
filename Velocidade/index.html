<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Soma com valor fixo</title>
</head>
<body>

    <h2>Digite um valor:</h2>

    <input type="number" id="valor" placeholder="Digite um número">
    <button onclick="calcular()">Calcular</button>

    <p id="resultado"></p>

    <script>
        let v = 10;

        function calcular() {
            let x = document.getElementById("valor").value;
            let r = v + Number(x);

            document.getElementById("resultado").innerText = "Resultado: " + r;
        }
    </script>

</body>
</html>
