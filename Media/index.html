<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <title>Cálculo de Média</title>
</head>
<body>
    <h1>Calculadora de Média</h1>

    <label for="nota1">Nota 1:</label>
    <input type="number" id="nota1" step="0.1" /><br/><br/>

    <label for="nota2">Nota 2:</label>
    <input type="number" id="nota2" step="0.1" /><br/><br/>

    <label for="nota3">Nota 3:</label>
    <input type="number" id="nota3" step="0.1" /><br/><br/>

    <button onclick="calcularMedia()">Calcular Média</button>

    <h2 id="resultado"></h2>

    <script>
        const m = 7;

        function calcularMedia() {
            let a = parseFloat(document.getElementById("nota1").value);
            let b = parseFloat(document.getElementById("nota2").value);
            let c = parseFloat(document.getElementById("nota3").value);

            if (isNaN(a) || isNaN(b) || isNaN(c)) {
                alert("Por favor, preencha todas as notas corretamente.");
                return;
            }

            let media = (a + b + c) / 3;

            let mensagem = "Média: " + media.toFixed(2) + "<br>";

            if (media >= m) {
                mensagem += "Parabéns, Aprovado!";
            } else {
                mensagem += "Reprovado, estude mais.";
            }

            document.getElementById("resultado").innerHTML = mensagem;
        }
    </script>
</body>
</html>
